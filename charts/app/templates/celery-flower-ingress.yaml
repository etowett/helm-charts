{{- if and .Values.celery.enabled .Values.celery.flower.enabled .Values.celery.flower.ingress.enabled -}}
{{- $fullName := printf "%s-celery-flower" (include "app.fullname" .) -}}
{{- $svcPort := .Values.celery.flower.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-flower
  {{- with .Values.celery.flower.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.celery.flower.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.celery.flower.ingress.tls }}
  tls:
    {{- range . }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.celery.flower.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
