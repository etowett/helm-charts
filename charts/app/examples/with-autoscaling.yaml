# Application with Autoscaling and PDB Example
# This example shows horizontal pod autoscaling and pod disruption budget

# Initial replica count (overridden when autoscaling is enabled)
replicaCount: 3

image:
  repository: myapp/web
  tag: "1.0.0"
  pullPolicy: IfNotPresent

app:
  name: mywebapp
  env: production
  country: us

service:
  type: ClusterIP
  port: 8080

# Enable autoscaling
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Enable pod disruption budget to ensure availability during voluntary disruptions
pdb:
  enabled: true
  minAvailable: 2

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /health
  port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  path: /ready
  port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3

# Node affinity to prefer specific node types
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
                - t3.large
                - t3.xlarge

# Add pod anti-affinity to spread pods across nodes
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - mywebapp
          topologyKey: kubernetes.io/hostname
