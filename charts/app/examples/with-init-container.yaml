# Application with Init Container Example
# This example shows how to run database migrations before the main app starts

replicaCount: 3

image:
  repository: myapp/web
  tag: "1.0.0"
  pullPolicy: IfNotPresent

app:
  name: mywebapp
  env: production
  country: us

service:
  type: ClusterIP
  port: 8080

# Init container to run database migrations
initContainer:
  enabled: true
  name: db-migrations
  commands: ["python"]
  args: ["manage.py", "migrate", "--noinput"]
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  DATABASE_HOST: "postgres.default.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "myapp"

secretEnv:
  DATABASE_PASSWORD:
    name: db-credentials
    key: password
  SECRET_KEY:
    name: app-secrets
    key: django-secret-key
